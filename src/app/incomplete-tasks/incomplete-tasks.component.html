<ng-container *ngIf="(incompleteTasksList$ | async) as incompleteTasks">
    <ng-container *ngIf="incompleteTasks.length > 0 else noTasks">
        <ng-container *ngFor="let task of incompleteTasks; trackBy: trackById;let i = index;">
            <div class="flex items-center justify-between mx-4 border-b p-2">
                <div class="flex flex-col">
                    <mat-checkbox class="text-slate-500" color="primary" aria-label="toggleCompleteTask"
                        (change)="onTaskCheck(task.id, $event.checked)" [checked]="task.isCompleted">
                        <span class="font-medium text-base">{{task.taskName}}</span>
                    </mat-checkbox>
                    <p class="mt-0 ms-10 text-sm text-slate-500">{{task.dateCreated}}</p>
                </div>
                <div>
                    <button mat-icon-button class="ml-2" (click)="onEditTask(task)"><mat-icon aria-hidden="false"
                            aria-label="edit-task" fontIcon="edit"></mat-icon></button>
                    <button mat-icon-button class="ml-2" (click)="onDeleteTask(task.id)"><mat-icon aria-hidden="false"
                            aria-label="delete-task" fontIcon="delete"></mat-icon></button>
                </div>
            </div>
        </ng-container>
    </ng-container>
    <ng-template #noTasks>
        <div class="flex flex-col items-center justify-center bg-white p-10 border-r-2">
            <img width="500" height="500" src="../../assets/images/no-tasks.jpg">
            <h2 class="text-3xl m-4">There are no tasks!</h2>
        </div>
    </ng-template>
</ng-container>
